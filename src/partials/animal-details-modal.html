<div class="pet-backdrop is-hidden" data-pet-modal-backdrop>
  <div
    class="pet-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="petModalTitle"
  >
    <button
      class="pet-modal__close"
      type="button"
      aria-label="Close"
      data-pet-modal-close
    >
      <svg width="24" height="24">
        <use href="/icons.svg#icon-close"></use>
      </svg>
    </button>

    <div class="pet-modal__layout">
      <div class="pet-modal__img-wrap">
        <img
          class="pet-modal__img"
          src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMu/b3JnLzIwMDAvc3ZnIj48/cmVjdCB3aWR0aD0iMTAw/IiBoZWlnaHQ9IjEwMCIg/ZmlsbD0iI2RkZGRkZCIv/Pjwvc3ZnPg=="
          alt="Фото тварин"
          loading="lazy"
          data-pet-modal-img
        />
      </div>

      <div class="pet-modal__content">
        <p class="pet-modal__type" data-pet-modal-type>Собака</p>

        <h2 class="pet-modal__name" id="petModalTitle" data-pet-modal-name>
          Джек
        </h2>

        <p class="pet-modal__meta" data-pet-modal-meta>4 роки • Хлопчик</p>

        <div class="pet-modal__scroll">
          <h3 class="pet-modal__subtitle">Опис:</h3>
          <p class="pet-modal__text" data-pet-modal-desc></p>

          <h3 class="pet-modal__subtitle">Здоров'я:</h3>
          <p class="pet-modal__text" data-pet-modal-health></p>

          <h3 class="pet-modal__subtitle">Поведінка:</h3>
          <p class="pet-modal__text" data-pet-modal-behavior></p>
        </div>

        <button class="pet-modal__btn" type="button" data-pet-modal-adopt>
          Взяти додому
        </button>
      </div>
    </div>
  </div>
</div>
